<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 기초학력 연수 이수증 제출</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 550px; margin: 30px auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; font-weight: 600; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #4e5d6c; font-size: 14px; }
        input[type="text"], input[type="number"], input[type="file"] { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border 0.2s; }
        input[type="text"]:focus, input[type="number"]:focus { border-color: #4a90e2; outline: none; }
        input[type="file"] { background: #fafafa; cursor: pointer; }
        button { width: 100%; padding: 14px; background-color: #4a90e2; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background-color: #357abd; }
        .loading { display: none; text-align: center; color: #4a90e2; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>교사 기초학력 연수 이수증 제출</h2>
    <form id="submissionForm">
        <div class="form-group">
            <label for="teacherName">교원명</label>
            <input type="text" id="teacherName" required placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label for="courseName">연수명</label>
            <input type="text" id="courseName" required placeholder="연수 과정명을 입력하세요">
        </div>
        <div class="form-group">
            <label for="institution">연수기관</label>
            <input type="text" id="institution" required placeholder="기관명을 입력하세요">
        </div>
        <div class="form-group">
            <label for="hours">이수시간 (시간)</label>
            <input type="number" id="hours" required min="1" placeholder="숫자만 입력하세요">
        </div>
        <div class="form-group">
            <label for="certNumber">이수번호</label>
            <input type="text" id="certNumber" required placeholder="제0000-00호 등">
        </div>
        <div class="form-group">
            <label for="pdfFile">연수 이수증 파일 (PDF만 가능)</label>
            <input type="file" id="pdfFile" accept=".pdf" required>
        </div>
        <button type="submit" id="submitBtn">이수증 제출하기</button>
    </form>
    <div class="loading" id="loadingText">처리 중입니다. 잠시만 기다려 주세요...</div>
</div>

<script>
    // ⚠️ 주의: 1단계에서 복사한 구글 Apps Script 배포 URL을 여기에 붙여넣으세요.
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxAkCx5cnWucKW8lpuSsl3SJtwOiRv83AgkufgvlfdUSPEmseOHPJU6hMSqAm6jhInt/exec";

    document.getElementById('submissionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        const loadingText = document.getElementById('loadingText');
        const fileInput = document.getElementById('pdfFile');
        const file = fileInput.files[0];
        
        if (!file) return alert("PDF 파일을 업로드해 주세요.");
        
        submitBtn.disabled = true;
        loadingText.style.display = "block";

        // 파일을 Base64 데이터로 인코딩하여 전송하기 위한 FileReader 함수
        const reader = new FileReader();
        reader.onload = function(event) {
            const formData = {
                teacherName: document.getElementById('teacherName').value,
                courseName: document.getElementById('courseName').value,
                institution: document.getElementById('institution').value,
                hours: document.getElementById('hours').value,
                certNumber: document.getElementById('certNumber').value,
                fileName: file.name,
                fileData: event.target.result
            };

            // 구글 스크립트 서버로 데이터 전송 (CORS 방지 처리를 위해 fetch 사용)
            fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(formData),
                mode: 'no-cors' // 중요: Apps Script 교차 출처 대응
            })
            .then(() => {
                alert("이수증 제출이 완료되었습니다!");
                document.getElementById('submissionForm').reset();
            })
            .catch(error => {
                alert("오류가 발생했습니다. 다시 시도해 주세요.");
                console.error(error);
            })
            .finally(() => {
                submitBtn.disabled = false;
                loadingText.style.display = "none";
            });
        };
        
        reader.readAsDataURL(file); // 파일을 읽어 base64 스트링으로 변환
    });
</script>

</body>
</html>
